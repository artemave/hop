# Omen Configuration (Rust CLI v4.x)
# Generated for the hop project (Python). Customize as needed.
# Documentation: https://github.com/panbanda/omen

# Exclude patterns (glob) - files/directories to skip during analysis
exclude_patterns = [
    # Test files
    "**/test_*.py",
    "**/*_test.py",
    "tests/**",

    # Python caches / virtualenv
    "**/__pycache__/**",
    ".venv/**",
    "venv/**",
    ".pytest_cache/**",
    ".mypy_cache/**",
    ".ruff_cache/**",

    # Build/output
    "dist/**",
    "build/**",
    ".git/**",
    ".omen/**",

    # Lock files
    "uv.lock",
]

[complexity]
cyclomatic_warn = 10
cyclomatic_error = 20
cognitive_warn = 15
cognitive_error = 30
max_nesting = 4

[satd]
categories = ["design", "defect", "requirement", "test", "performance", "security"]
custom_markers = []

[churn]
since = "6m"
top = 20

[duplicates]
min_tokens = 50
